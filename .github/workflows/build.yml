name: Build and testing the project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest

    strategy:
      fail-fast: false

      matrix:
        os:
          - windows
          - ubuntu
          - macos
        compiler:
          - gcc
          - llvm
        generator:
          - "Unix Makefiles"
        build-type:
          - Release
          - Debug
        is-shared:
          - OFF
          - ON

        include:
          - os: windows
            compiler: msvc
            generator: "Visual Studio 18 2026"

    steps:
      - uses: actions/checkout@v6

      - name: Setup C compiler
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: ${{ contains(matrix.os, 'windows') }}

          cmake: true
          make: true

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build-type }}
          -DBUILD_SHARED_LIBS:BOOL=${{ matrix.is-shared }}

      - name: Build project
        run: |
          cmake --build build --config ${{ matrix.build-type }}

      - name: Run tests
        working-directory: ./build
        run: |
          ctest --output-on-failure -C ${{ matrix.build-type }}