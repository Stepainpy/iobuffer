name: Build and testing the project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest

    strategy:
      fail-fast: false

      matrix:
        os:
          - windows
          - ubuntu
          - macos
        compiler:
          - gcc
          - llvm
        is-shared:
          - OFF
          - ON
        build-type:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v6

      - name: Setup C compiler
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          make: true

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build-type }}
          -DBUILD_SHARED_LIBS:BOOL=${{ matrix.is-shared }}

      - name: Build project
        run: |
          cmake --build build --config ${{ matrix.build-type }}

      - name: Run tests
        working-directory: ./build
        run: |
          ctest --output-on-failure -C ${{ matrix.build-type }}

  build-msvc:
    runs-on: windows-latest

    strategy:
      fail-fast: false

      matrix:
        is-shared:
          - OFF
          - ON
        build-type:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v6

      - name: Setup C compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "Visual Studio 18 2026"
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build-type }}
          -DBUILD_SHARED_LIBS:BOOL=${{ matrix.is-shared }}

      - name: Build project
        run: |
          cmake --build build --config ${{ matrix.build-type }}

      - name: Run tests
        working-directory: ./build
        run: |
          ctest --output-on-failure -C ${{ matrix.build-type }}