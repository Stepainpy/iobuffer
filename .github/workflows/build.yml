name: Build and testing the project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest

    strategy:
      fail-fast: false

      matrix:
        os:
          - windows
          - ubuntu
          - macos
        compiler:
          - gcc
          - llvm
        generator:
          - "Unix Makefiles"
        build-type:
          - Release
          - Debug
        is-shared:
          - OFF
          - ON

        include:
          - os: windows
            compiler: msvc
            generator: "Visual Studio 18 2026"

    steps:
      - uses: actions/checkout@v6

      - name: Setup C compiler
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: ${{ contains(matrix.os, 'windows') }}

          cmake: true
          make: true

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE:STRING=${{ matrix.build-type }}
          -DBUILD_SHARED_LIBS:BOOL=${{ matrix.is-shared }}

      - name: Build project
        run: |
          cmake --build build --config ${{ matrix.build-type }}

      - name: Run tests
        working-directory: ./build
        run: |
          ctest --output-on-failure -C ${{ matrix.build-type }}

  build-linux:
    if: false
    strategy:
      matrix:
        compiler: [gcc, clang]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.compiler }} cmake
          echo CC=${{ matrix.compiler }} >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build --config Release

      - name: Run tests
        working-directory: ./build
        run: ctest --output-on-failure

  build-macos:
    if: false
    strategy:
      matrix:
        compiler: [gcc, clang]

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        shell: bash
        run: |
          if [ "${{ matrix.compiler }}" == "clang" ]; then
            brew install llvm
          else
            brew install ${{ matrix.compiler }}
          fi
          brew install cmake
          echo CC=${{ matrix.compiler }} >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build --config Release

      - name: Run tests
        working-directory: ./build
        run: ctest --output-on-failure

  build-windows:
    if: false
    strategy:
      matrix:
        compiler: [gcc, clang, cl]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.compiler == 'cl'
      - name: Setup MSVC, pt. 2
        if: matrix.compiler == 'cl'
        run: |
          echo generator="Visual Studio 18 2026" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup GCC/Clang
        uses: rlalik/setup-cpp-compiler@v2
        with:
          compiler: ${{ matrix.compiler }}-latest
        if: matrix.compiler != 'cl'
      - name: Setup GCC/Clang, pt. 2
        if: matrix.compiler != 'cl'
        run: |
          echo generator="Unix Makefiles" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo CC=${{ matrix.compiler }}  | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "${{ env.generator }}"

      - name: Build project
        run: cmake --build build --config Release

      - name: Run tests
        working-directory: ./build
        run: ctest --output-on-failure -C Release